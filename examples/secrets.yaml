# ─── Conduit Secrets Configuration ────────────────────────────────────────────
# Configures how Conduit resolves credential references in connection configs.
#
# Credentials are resolved through a chain of backends, tried in order:
#   1. Environment variables:       ${VAR_NAME}
#   2. Files:                       file:///path/to/secret
#   3. HashiCorp Vault:             vault://path/to/secret#field
#   4. AWS SSM Parameter Store:     ssm:///parameter/path
#   5. AWS Secrets Manager:         secretsmanager://secret-name#key
#   6. GCP Secret Manager:          gcp-secret://secret-name/versions/latest
#   7. Literal value (fallback):    "my-password"
#
# Backends only activate for their prefix — a vault:// reference won't hit
# AWS, and an ssm:// reference won't hit Vault. Literal values are always
# the last resort.

secrets:
  # ── Cache ──────────────────────────────────────────────────────────────────
  # Cache resolved secrets in memory for the lifetime of the process.
  # Avoids repeated round-trips to external backends.
  cache_enabled: true

  # ── HashiCorp Vault ────────────────────────────────────────────────────────
  # vault:
  #   address: "https://vault.internal:8200"
  #   auth_method: token           # token | approle | kubernetes | aws-iam
  #   token: "${VAULT_TOKEN}"      # Can itself be an env var
  #   mount: secret                # KV v2 engine mount path
  #   namespace: "engineering"     # Vault Enterprise namespace (optional)
  #   timeout_secs: 5
  #   skip_tls_verify: false
  #
  #   # AppRole auth (if auth_method: approle)
  #   # role_id: "${VAULT_ROLE_ID}"
  #   # secret_id: "${VAULT_SECRET_ID}"
  #
  #   # Kubernetes auth (if auth_method: kubernetes)
  #   # k8s_role: "conduit-pipeline"
  #
  #   # TLS (optional)
  #   # ca_cert: "/etc/ssl/vault-ca.pem"

  # ── AWS (SSM + Secrets Manager) ────────────────────────────────────────────
  # aws:
  #   region: us-east-1            # Falls back to AWS_REGION env var
  #   profile: production          # AWS profile name (optional)
  #   endpoint_url: null           # LocalStack: "http://localhost:4566"
  #   timeout_secs: 5

  # ── GCP Secret Manager ────────────────────────────────────────────────────
  # gcp:
  #   project: "my-gcp-project"    # Falls back to GOOGLE_CLOUD_PROJECT env var
  #   credentials_file: null       # Path to service account key JSON (optional)
  #   timeout_secs: 5

# ─── Example: Connections Using External Secrets ─────────────────────────────
#
# With the above secrets config enabled, connections can reference secrets
# from any backend:
#
#   production_db:
#     type: postgres
#     host: prod-db.internal
#     port: 5432
#     database: analytics
#     credentials: "vault://secret/data/prod-db#password"    # From Vault
#
#   staging_db:
#     type: postgres
#     host: staging-db.internal
#     port: 5432
#     database: analytics
#     credentials: "ssm:///staging/db/password"               # From AWS SSM
#
#   bigquery_prod:
#     type: bigquery
#     project: my-gcp-project
#     dataset: analytics
#     credentials: "gcp-secret://bq-service-account"          # From GCP SM
#
#   dev_db:
#     type: postgres
#     host: localhost
#     port: 5432
#     database: dev
#     credentials: "${DEV_DB_PASSWORD}"                        # From env var
#
#   local_duck:
#     type: duckdb
#     database: "./data/local.duckdb"
#     credentials: "no-auth-needed"                            # Literal
