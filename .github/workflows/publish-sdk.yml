name: Publish conduit-sdk

# Publishes the pure-Python authoring SDK (sdk/python) to PyPI on sdk-v* tags
# (e.g. sdk-v0.2.0), decoupled from the CLI's v* releases and the native
# wheel's publish-python workflow (PRD B4 / OD4).
#
# Prerequisite (one-time): configure a PyPI Trusted Publisher for the
# `conduit-sdk` project pointing at this repository + workflow file, so no
# API token secret is needed (OIDC).

on:
  push:
    tags:
      - 'sdk-v*'

permissions:
  contents: write

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify tag matches pyproject version
        working-directory: sdk/python
        run: |
          tag_version="${GITHUB_REF_NAME#sdk-v}"
          proj_version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag_version" != "$proj_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $proj_version"
            exit 1
          fi

      - name: Build distributions
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Run tests against the built wheel
        working-directory: sdk/python
        run: |
          python -m pip install dist/*.whl pytest
          python -m pytest tests/ -q

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: sdk/python/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
