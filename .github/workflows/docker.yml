name: Publish Docker image

# Builds the single-binary Conduit image (API + UI + Python runtime) and
# pushes it to GitHub Container Registry (PRD B7).
#
# Triggers on v* tags (a CLI release) and pushes to main. Tags produced:
#   - ghcr.io/<owner>/conduit:latest        (main + tagged releases)
#   - ghcr.io/<owner>/conduit:<version>     (on v* tags, e.g. 0.2.0)
#   - ghcr.io/<owner>/conduit:sha-<short>   (every build)
#
# No secrets needed — GITHUB_TOKEN has package-write permission below.
# One-time: after the first push, set the package visibility (public/private)
# in the repo's Packages settings.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/conduit

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest on the default branch + release tags; a semver tag on v*;
          # and a short-sha tag on every build for precise pinning.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
