name: Deploy docs

# Builds the mdBook (docs/) and publishes it to GitHub Pages (PRD B6).
#
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
# After that, every push to main that touches docs/ (or a manual run)
# rebuilds and deploys the site.
#
# The provider reference chapter is generated from code
# (conduit-providers/tests/provider_docs_test.rs); CI fails that test if it
# drifts, so the docs build here always reflects the committed, in-sync copy.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch: {}

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: '0.4.40'
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Build
        run: mdbook build docs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
