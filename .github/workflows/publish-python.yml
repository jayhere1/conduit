name: Publish conduit-native

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build wheel (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y clang librocksdb-dev

      - name: Build wheel
        run: |
          pip install maturin>=1.7
          cd conduit-python
          maturin build --release --strip -o dist/

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: conduit-python/dist/*.whl

  release:
    name: Create GitHub Release
    needs: [build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
